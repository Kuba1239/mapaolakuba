<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kuba & Ola - Mapa Wspomnień</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #ff6b6b;
            --primary-hover: #ff4757;
            --dark-glass: rgba(25, 25, 25, 0.75);
            --darker-glass: rgba(15, 15, 15, 0.9);
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Montserrat', sans-serif; background-color: #121212; color: var(--text-main); overflow: hidden; position: relative; }
        
        /* POPRAWKA: Mapa rozciągnięta absolutnie na pełen ekran z ciemnym tłem pod spodem */
        #map { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; background-color: #141414 !important; }

        .glass-panel { background: var(--dark-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4); }

        #header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); border-radius: 20px; padding: 15px 30px; text-align: center; z-index: 1000; width: max-content; min-width: 280px; max-width: 90%; transition: all 0.3s ease; }
        #header h1 { margin: 0 0 10px 0; font-size: 22px; font-weight: 700; background: -webkit-linear-gradient(45deg, #ff6b6b, #ffb88e); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .stats-container { display: flex; justify-content: space-around; gap: 15px; font-size: 12px; font-weight: 500; color: #e0e0e0; }
        .stat-box { display: flex; flex-direction: column; align-items: center; }
        .stat-value { font-size: 18px; font-weight: 700; color: var(--primary); margin-top: 4px; }

        #sidebar-toggle { position: absolute; top: 20px; right: 20px; z-index: 1000; padding: 12px 20px; border-radius: 30px; background: var(--primary); color: white; border: none; font-family: 'Montserrat', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4); transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        #sidebar-toggle:hover { background: var(--primary-hover); transform: translateY(-2px); }

        #sidebar { position: absolute; top: 0; right: -400px; width: 350px; height: 100vh; z-index: 1001; background: var(--darker-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-left: 1px solid rgba(255, 255, 255, 0.1); transition: right 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; box-sizing: border-box; }
        #sidebar.open { right: 0; }
        
        .sidebar-header { padding: 25px 20px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); display: flex; justify-content: space-between; align-items: center; }
        .sidebar-header h2 { margin: 0; font-size: 20px; color: var(--primary); }
        #sidebar-close { background: none; border: none; color: white; font-size: 20px; cursor: pointer; transition: color 0.2s; }
        #sidebar-close:hover { color: var(--primary); }
        .sidebar-content { padding: 20px; overflow-y: auto; flex: 1; }
        .sidebar-content::-webkit-scrollbar { width: 6px; }
        .sidebar-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        .country-card { background: rgba(255, 255, 255, 0.05); border-radius: 12px; margin-bottom: 15px; border: 1px solid rgba(255, 255, 255, 0.05); overflow: hidden; transition: all 0.3s ease; }
        .country-card-header { padding: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 600; }
        .country-card-header:hover { background: rgba(255, 255, 255, 0.1); }
        .country-name { display: flex; align-items: center; gap: 10px; font-size: 16px; }
        .country-total-cost { color: var(--primary); font-size: 14px; font-weight: 700;}
        .country-card-body { display: none; padding: 0 15px 15px 15px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
        .country-card.active .country-card-body { display: block; }
        .country-card.active .fa-chevron-down { transform: rotate(180deg); transition: 0.3s; }

        .place-item { padding: 12px 0; border-bottom: 1px dashed rgba(255, 255, 255, 0.1); }
        .place-item:last-child { border-bottom: none; }
        .place-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .place-name { font-weight: 600; font-size: 14px; }
        .place-cost { color: #ccc; font-size: 12px; }
        .place-summary { font-size: 12px; color: var(--text-muted); font-style: italic; line-height: 1.4; }

        #modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { padding: 25px; border-radius: 20px; width: 320px; max-width: 90%; text-align: center; position: relative; }
        .modal-content h3 { margin-top: 0; color: var(--primary); font-size: 22px; }
        .input-group { margin-bottom: 12px; text-align: left; }
        .input-group label { display: block; font-size: 11px; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px;}
        
        .modal-content input[type="text"], .modal-content input[type="number"], .modal-content textarea { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255,255,255,0.15); color: white; border-radius: 10px; font-family: 'Montserrat', sans-serif; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
        .modal-content input:focus, .modal-content textarea:focus { border-color: var(--primary); }
        .modal-content textarea { resize: vertical; min-height: 60px; }
        .modal-content input[type="file"] { width: 100%; font-size: 12px; color: #aaa; margin-bottom: 15px;}
        .modal-content input[type="file"]::file-selector-button { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); padding: 8px 15px; border-radius: 8px; cursor: pointer; font-family: 'Montserrat', sans-serif; margin-right: 10px; transition: 0.3s; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-weight: 600; flex: 1; transition: 0.2s; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .btn-cancel { background: rgba(255,255,255,0.1); color: white; }
        .btn-save { background: linear-gradient(45deg, #ff6b6b, #ff4757); color: white; }

        .leaflet-popup-content-wrapper { background: var(--dark-glass); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); color: #ffffff; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .leaflet-popup-tip { background: var(--dark-glass); }
        .leaflet-popup-content { font-family: 'Montserrat', sans-serif; margin: 15px; width: max-content; max-width: 280px; }
        .popup-title { color: var(--primary); font-size: 16px; font-weight: 700; margin-bottom: 5px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 5px;}
        .popup-detail { font-size: 13px; color: #ddd; margin: 4px 0; display: flex; align-items: center; gap: 6px; }
        .popup-desc { margin-top: 8px; font-size: 12px; color: #aaa; font-style: italic; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 8px; border-left: 2px solid var(--primary);}
        .popup-gallery { display: flex; gap: 8px; margin-top: 12px; overflow-x: auto; padding-bottom: 5px; }
        .popup-gallery img { width: 120px; height: 90px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); flex-shrink: 0;}
        .leaflet-bar a { background-color: rgba(30,30,30,0.8) !important; color: #fff !important; border-bottom: 1px solid #444 !important; backdrop-filter: blur(5px);}

        .btn-delete-pin { margin-top: 15px; background: rgba(255, 71, 87, 0.1); border: 1px solid var(--primary); color: var(--primary); width: 100%; padding: 8px; border-radius: 8px; cursor: pointer; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 600; transition: 0.3s; }
        .btn-delete-pin:hover { background: var(--primary); color: white; }

        @media (max-width: 600px) {
            #header { top: 45px; padding: 12px 10px; width: 90%; }
            #header h1 { font-size: 18px; }
            .stats-container { gap: 5px; font-size: 10px; }
            .stat-value { font-size: 14px; }
            
            #sidebar { width: 100%; right: -100%; }
            #sidebar-toggle { top: auto; bottom: 25px; left: 50%; transform: translateX(-50%); right: auto; padding: 10px 18px; font-size: 13px; border-radius: 30px;}
            .leaflet-control-zoom { display: none; }
        }
    </style>
</head>
<body>

    <div id="header" class="glass-panel">
        <h1>Kuba & Ola <i class="fa-solid fa-earth-europe"></i></h1>
        <div class="stats-container">
            <div class="stat-box">Odwiedzone kraje<span class="stat-value" id="count-countries">0</span></div>
            <div class="stat-box">Łącznie podróży<span class="stat-value" id="count-trips">0</span></div>
            <div class="stat-box">Łącznie wydaliśmy<span class="stat-value" id="total-cost">0 zł</span></div>
        </div>
    </div>

    <button id="sidebar-toggle"><i class="fas fa-book-open"></i> Dziennik podróży</button>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Nasze kraje</h2>
            <button id="sidebar-close"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-content" id="country-list"></div>
    </div>

    <div id="modal-overlay">
        <div class="modal-content glass-panel">
            <h3>Nowe wspomnienie ✨</h3>
            <div class="input-group"><input type="text" id="input-name" placeholder="Nazwa miejsca" required autocomplete="off"></div>
            <div class="input-group"><input type="text" id="input-country" placeholder="Kraj (Wyszukiwanie...)" required autocomplete="off"></div>
            <div class="input-group"><input type="number" id="input-cost" placeholder="Wydano (w zł)" min="0" autocomplete="off"></div>
            <div class="input-group"><textarea id="input-summary" placeholder="Krótkie podsumowanie lub wspomnienie z tego miejsca..."></textarea></div>
            <div class="input-group">
                <label>Dodaj zdjęcia (max 2):</label>
                <input type="file" id="input-photos" accept="image/*" multiple>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-cancel" id="btn-cancel">Anuluj</button>
                <button class="btn btn-save" id="btn-save">Zapisz</button>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyDSEGVhqxxte-723uXPAfWTzB8ozcbhfIY",
            authDomain: "mapa-3d14d.firebaseapp.com",
            projectId: "mapa-3d14d",
            storageBucket: "mapa-3d14d.firebasestorage.app",
            messagingSenderId: "547897043084",
            appId: "1:547897043084:web:f0a416f7277291ccc8b3a9"
        };

        const IMGBB_API_KEY = "8463ef43888701a9ec1d676d17cf48aa";

        let app, db;
        try {
            app = initializeApp(firebaseConfig);
            db = getFirestore(app);
        } catch(e) { console.log("Pamiętaj o podaniu konfiguracji Firebase!"); }

        const map = L.map('map', { zoomControl: false }).setView([50.0, 15.0], 4);
        L.control.zoom({ position: 'bottomleft' }).addTo(map); 
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', subdomains: 'abcd', maxZoom: 20 }).addTo(map);

        let markers = L.layerGroup().addTo(map);
        let clickedLatLng = null;

        const modal = document.getElementById('modal-overlay');
        const btnCancel = document.getElementById('btn-cancel');
        const btnSave = document.getElementById('btn-save');
        const inputName = document.getElementById('input-name');
        const inputCountry = document.getElementById('input-country');
        const inputCost = document.getElementById('input-cost');
        const inputSummary = document.getElementById('input-summary');
        const inputPhotos = document.getElementById('input-photos');
        const sidebar = document.getElementById('sidebar');
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebarClose = document.getElementById('sidebar-close');
        const countryListContainer = document.getElementById('country-list');

        sidebarToggle.addEventListener('click', () => sidebar.classList.add('open'));
        sidebarClose.addEventListener('click', () => sidebar.classList.remove('open'));

        window.usunPinezke = async function(docId) {
            if(confirm("Czy na pewno chcesz usunąć to wspomnienie? Zniknie ono z mapy i z dziennika.")) {
                try {
                    await deleteDoc(doc(db, "places", docId));
                } catch (error) {
                    console.error("Błąd usuwania:", error);
                    alert("Nie udało się usunąć wspomnienia. Spróbuj ponownie.");
                }
            }
        };

        map.on('contextmenu', async function(e) {
            clickedLatLng = e.latlng;
            modal.style.display = 'flex';
            inputName.focus();
            inputCountry.value = "Szukam kraju...";
            inputCountry.disabled = true; 

            try {
                const response = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${e.latlng.lat}&longitude=${e.latlng.lng}&localityLanguage=pl`);
                const data = await response.json();
                inputCountry.disabled = false;
                if (data.countryName) inputCountry.value = data.countryName;
                else { inputCountry.value = ""; inputCountry.placeholder = "Wpisz ręcznie (np. Ocean)"; }
            } catch (error) {
                inputCountry.disabled = false; inputCountry.value = ""; 
            }
        });

        btnCancel.addEventListener('click', () => { modal.style.display = 'none'; czyscFormularz(); });

        btnSave.addEventListener('click', async () => {
            const nameVal = inputName.value.trim(); const countryVal = inputCountry.value.trim();
            const costVal = parseFloat(inputCost.value) || 0; const summaryVal = inputSummary.value.trim();
            const files = inputPhotos.files;

            if (nameVal === "" || countryVal === "") { alert("Wypełnij nazwę i kraj!"); return; }
            if (files.length > 2) { alert("Max 2 zdjęcia!"); return; }
            if (IMGBB_API_KEY === "TWÓJ_KLUCZ_API_IMGBB" && files.length > 0) {
                alert("Aby dodać zdjęcie, musisz najpierw wkleić klucz API ImgBB w kodzie!"); return;
            }

            btnSave.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Zapisywanie...';
            btnSave.disabled = true;

            try {
                let photoUrls = [];
                
                if(files.length > 0) {
                    for (let i = 0; i < files.length; i++) {
                        const formData = new FormData();
                        formData.append("image", files[i]);
                        
                        const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                            method: 'POST',
                            body: formData
                        });
                        const data = await response.json();
                        
                        if(data.success) {
                            photoUrls.push(data.data.url);
                        } else {
                            console.error("Błąd przesyłania do ImgBB:", data);
                        }
                    }
                }

                if(db) {
                    await addDoc(collection(db, "places"), {
                        name: nameVal, country: countryVal.toLowerCase(), displayCountry: countryVal,
                        cost: costVal, summary: summaryVal, lat: clickedLatLng.lat, lng: clickedLatLng.lng,
                        photos: photoUrls, createdAt: new Date()
                    });
                }
                modal.style.display = 'none'; czyscFormularz();
            } catch (error) { alert("Błąd! Sprawdź konfigurację bazy."); }
            
            btnSave.innerHTML = "Zapisz"; btnSave.disabled = false;
        });

        function czyscFormularz() { inputName.value = ""; inputCountry.value = ""; inputCost.value = ""; inputSummary.value = ""; inputPhotos.value = ""; clickedLatLng = null; }

        if(db) {
            const q = query(collection(db, "places"), orderBy("createdAt", "asc"));
            onSnapshot(q, (snapshot) => {
                markers.clearLayers();
                let totalMoney = 0; const uniqueCountries = new Set(); const countryStats = {}; 
                let totalTrips = 0;

                snapshot.forEach((docSnap) => {
                    totalTrips++;
                    
                    const data = docSnap.data(); const cKey = data.displayCountry || data.country; 
                    if(data.cost) totalMoney += data.cost;
                    if(cKey) uniqueCountries.add(cKey);

                    if(!countryStats[cKey]) countryStats[cKey] = { totalCost: 0, places: [] };
                    countryStats[cKey].totalCost += (data.cost || 0); countryStats[cKey].places.push(data);

                    const marker = L.marker([data.lat, data.lng]);
                    let popupHtml = `<div class="popup-title">${data.name}</div><div class="popup-detail"><i class="fas fa-map-marker-alt" style="color:var(--primary)"></i> ${cKey}</div>`;
                    if(data.cost > 0) popupHtml += `<div class="popup-detail"><i class="fas fa-wallet" style="color:#2ecc71"></i> ${data.cost} zł</div>`;
                    if(data.summary) popupHtml += `<div class="popup-desc">"${data.summary}"</div>`;
                    if (data.photos && data.photos.length > 0) {
                        popupHtml += `<div class="popup-gallery">`;
                        data.photos.forEach(url => popupHtml += `<a href="${url}" target="_blank"><img src="${url}"></a>`);
                        popupHtml += `</div>`;
                    }
                    
                    popupHtml += `<button class="btn-delete-pin" onclick="usunPinezke('${docSnap.id}')"><i class="fas fa-trash"></i> Usuń wspomnienie</button>`;

                    marker.bindPopup(popupHtml); markers.addLayer(marker);
                });

                document.getElementById('count-countries').innerText = uniqueCountries.size;
                document.getElementById('count-trips').innerText = totalTrips; 
                document.getElementById('total-cost').innerText = totalMoney.toLocaleString('pl-PL') + ' zł';

                countryListContainer.innerHTML = ""; 
                const sortedCountries = Object.keys(countryStats).sort();
                if(sortedCountries.length === 0) countryListContainer.innerHTML = "<p style='color:#aaa; text-align:center; margin-top: 30px;'>Kliknij z przytrzymaniem na mapę i dodaj pierwszą podróż!</p>";

                sortedCountries.forEach(countryName => {
                    const stats = countryStats[countryName];
                    const card = document.createElement('div'); card.className = 'country-card';
                    card.innerHTML = `<div class="country-card-header"><div class="country-name"><i class="fas fa-flag" style="color:var(--primary)"></i> ${countryName}</div><div style="display:flex; align-items:center; gap: 10px;">${stats.totalCost > 0 ? `<span class="country-total-cost">${stats.totalCost.toLocaleString('pl-PL')} zł</span>` : ''}<i class="fas fa-chevron-down" style="font-size:12px; color:#aaa;"></i></div></div><div class="country-card-body"></div>`;
                    const body = card.querySelector('.country-card-body');
                    stats.places.forEach(place => {
                        body.insertAdjacentHTML('beforeend', `<div class="place-item"><div class="place-header"><span class="place-name">${place.name}</span>${place.cost ? `<span class="place-cost">${place.cost} zł</span>` : ''}</div>${place.summary ? `<div class="place-summary">${place.summary}</div>` : ''}</div>`);
                    });
                    card.querySelector('.country-card-header').addEventListener('click', () => card.classList.toggle('active'));
                    countryListContainer.appendChild(card);
                });
            });
        }
    </script>
</body>
</html>
